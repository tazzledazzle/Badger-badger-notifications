services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: badger
      POSTGRES_USER: badger
      POSTGRES_PASSWORD: badger
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badger -d badger"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      JDBC_URL: jdbc:postgresql://postgres:5432/badger
      JDBC_USER: badger
      JDBC_PASSWORD: badger
      REDIS_URL: redis://redis:6379
      GATEWAY_API_KEY: dev-key

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "9404:9404"
    environment:
      JDBC_URL: jdbc:postgresql://postgres:5432/badger
      JDBC_USER: badger
      JDBC_PASSWORD: badger
      REDIS_URL: redis://redis:6379
      WORKER_CONSUMER_ID: worker-1
